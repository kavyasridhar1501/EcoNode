name: EcoNode Daily Pipeline

on:
  schedule:
    # Run daily at 06:00 UTC (after overnight data is finalized)
    - cron: "0 6 * * *"
  workflow_dispatch:
    # Allow manual triggers from the Actions tab

permissions:
  contents: read

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    # 10 regions x (EIA + weather ingestion, 2 Prophet fits, analysis) needs
    # more headroom than the original 3-region budget.
    timeout-minutes: 40

    env:
      EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run EcoNode pipeline
        run: python pipeline.py

      - name: Report status
        if: failure()
        run: echo "::error::EcoNode pipeline failed. Check logs above."
